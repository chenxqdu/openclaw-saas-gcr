# aws-load-balancer-controller — rendered statically from the upstream
# Helm chart (aws.github.io/eks-charts v3.2.1 → controller image v3.2.1).
# Workshop does NOT `helm install` this chart at runtime because the
# CN EKS IDE cannot reach aws.github.io (GFW resets the TLS handshake).
#
# Placeholders substituted by scripts/step2-k8s-components.sh via sed:
#   ${CLUSTER_NAME}, ${REGION}, ${VPC_ID}, ${ALB_CONTROLLER_ROLE_ARN}
#
# To refresh after an upstream chart bump:
#   helm repo add eks https://aws.github.io/eks-charts  (from a network with github.io access)
#   helm repo update eks
#   helm pull eks/aws-load-balancer-controller --version <new-ver>
#   helm template aws-load-balancer-controller ./aws-load-balancer-controller-<ver>.tgz \
#     --namespace kube-system \
#     --set clusterName=PLACEHOLDER_CLUSTER_NAME \
#     --set serviceAccount.create=true \
#     --set serviceAccount.name=aws-load-balancer-controller \
#     --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=PLACEHOLDER_ALB_CONTROLLER_ROLE_ARN" \
#     --set region=PLACEHOLDER_REGION \
#     --set vpcId=PLACEHOLDER_VPC_ID \
#     | sed -e 's|PLACEHOLDER_CLUSTER_NAME|${CLUSTER_NAME}|g' \
#           -e 's|PLACEHOLDER_ALB_CONTROLLER_ROLE_ARN|${ALB_CONTROLLER_ROLE_ARN}|g' \
#           -e 's|PLACEHOLDER_REGION|${REGION}|g' \
#           -e 's|PLACEHOLDER_VPC_ID|${VPC_ID}|g' \
#     > yaml/aws-load-balancer-controller.yaml
#
