# CN Image Mirror DaemonSet
#
# Purpose: In AWS China regions, nodes cannot pull from ghcr.io or docker.io.
# The openclaw-operator hardcodes these image references for init containers
# (ghcr.io/astral-sh/uv) and gateway proxy (docker.io/library/nginx).
#
# This DaemonSet runs on every node and:
# 1. Pulls equivalent images from CN ECR (via init containers)
# 2. Re-tags them to match the ghcr.io/docker.io references the operator expects
#
# When new images need mirroring:
# 1. Push to CN ECR: docker tag <source> <ecr>/<repo>:<tag> && docker push
# 2. Add a new init container + re-tag command below
#
# ECR Registry: 735091234506.dkr.ecr.cn-northwest-1.amazonaws.com.cn
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cn-image-mirror
  namespace: kube-system
  labels:
    app: cn-image-mirror
    purpose: ecr-to-ghcr-retag
spec:
  selector:
    matchLabels:
      app: cn-image-mirror
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: cn-image-mirror
    spec:
      hostPID: true
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
      initContainers:
      # Pull uv image from ECR
      - name: pull-uv
        image: 735091234506.dkr.ecr.cn-northwest-1.amazonaws.com.cn/uv:0.6-bookworm-slim
        command: ["echo", "uv image pulled to node"]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      # Pull nginx image from ECR
      - name: pull-nginx
        image: 735091234506.dkr.ecr.cn-northwest-1.amazonaws.com.cn/nginx:1.27-alpine
        command: ["echo", "nginx image pulled to node"]
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      containers:
      - name: retag
        image: 735091234506.dkr.ecr.cn-northwest-1.amazonaws.com.cn/nginx:1.27-alpine
        securityContext:
          privileged: true
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== CN Image Mirror: re-tagging ECR images to upstream names ==="

          # Re-tag uv: ECR → ghcr.io/astral-sh/uv
          nsenter -t 1 -m -u -i -n -- ctr -n k8s.io images tag \
            735091234506.dkr.ecr.cn-northwest-1.amazonaws.com.cn/uv:0.6-bookworm-slim \
            ghcr.io/astral-sh/uv:0.6-bookworm-slim 2>/dev/null || true
          echo "✓ uv:0.6-bookworm-slim tagged"

          # Re-tag nginx: ECR → docker.io/library/nginx
          nsenter -t 1 -m -u -i -n -- ctr -n k8s.io images tag \
            735091234506.dkr.ecr.cn-northwest-1.amazonaws.com.cn/nginx:1.27-alpine \
            docker.io/library/nginx:1.27-alpine 2>/dev/null || true
          echo "✓ nginx:1.27-alpine tagged"

          echo "=== All images mirrored successfully ==="
          # Stay alive (DaemonSet must keep running)
          exec sleep infinity
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      restartPolicy: Always
